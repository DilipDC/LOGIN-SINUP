<!DOCTYPE html>
<html>
<head>
<title>Auth API Test</title>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}
input,button{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}
button{
background:#6366f1;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h1>ULTRA Auth API Test</h1>

<h2>Signup</h2>
<input id="name" placeholder="Full Name"><br>
<input id="email" placeholder="Email"><br>
<input id="password" placeholder="Password"><br>
<input id="dob" placeholder="DOB (YYYY-MM-DD)"><br>
<input id="gender" placeholder="Gender"><br>

<button onclick="signup()">Signup</button>

<h2>Verify OTP</h2>
<input id="otp_email" placeholder="Email"><br>
<input id="otp" placeholder="OTP"><br>
<button onclick="verify()">Verify</button>

<h2>Login</h2>
<input id="login_email" placeholder="Email"><br>
<input id="login_password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<h2>Google Login</h2>
<button onclick="googleLogin()">Login with Google</button>

<h3 id="result"></h3>

<script>

const API = "https://loginpage12.pythonanywhere.com"

function signup(){

fetch(API + "/api/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:document.getElementById("name").value,
email:document.getElementById("email").value,
password:document.getElementById("password").value,
dob:document.getElementById("dob").value,
gender:document.getElementById("gender").value
})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("result").innerText=JSON.stringify(data)
})

}

function verify(){

fetch(API + "/api/verify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:document.getElementById("otp_email").value,
otp:document.getElementById("otp").value
})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("result").innerText=JSON.stringify(data)
})

}

function login(){

fetch(API + "/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:document.getElementById("login_email").value,
password:document.getElementById("login_password").value
})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("result").innerText=JSON.stringify(data)
})

}

function googleLogin(){

window.location.href = API + "/api/google-login"

}

</script>

</body>
</html>
